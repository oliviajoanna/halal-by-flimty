<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halal by Flimty - Daftar</title>
  <!--favicon-->
  <link rel="shortcut icon" href="asset/image/logo/favicon.ico" type="image/x-icon">
  
  <link rel="stylesheet" href="asset/css/stylelogin.css">
</head>
<body>
  <div class="wrapper">
    <form action="#">
      <h2>Daftar</h2>
      <div class="input-field">
        <input type="text" required>
        <label>Masukkan nama lengkap</label>
      </div>
      <div class="input-field">
        <input type="text" required>
        <label>Masukkan email</label>
      </div>
      <div class="input-field">
        <input type="password" required>
        <label>Buat kata sandi</label>
      </div>
      <div class="input-field">
        <input type="password" required>
        <label>Konfirmasi kata sandi</label>
      </div>
      <button type="submit">Daftar</button>
      <div class="register">
        <p>Sudah punya akun? <a href="masuk.html">Masuk</a></p>
      </div>
    </form>
  </div>
</body>
</html>
